<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>setuq — brand preview</title>
<style>
  body { margin:0; font-family: Inter, "Segoe UI", system-ui, sans-serif; background:#16181c; color:#f3f4f6; }
  h1 { font-weight:800; letter-spacing:-1px; padding:24px 32px 0; }
  p.sub { color:#9ca3af; padding:0 32px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; padding:24px 32px; }
  .tile { border-radius:14px; padding:28px; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .dark { background:#0b0c0e; border:1px solid #2e303a; }
  .light { background:#ffffff; }
  .purple { background:linear-gradient(135deg,#7e14ff,#47bfff); }
  .tile span { font-size:12px; letter-spacing:.5px; text-transform:uppercase; }
  .dark span { color:#9ca3af; } .light span { color:#6b7280; } .purple span { color:#ffffff; }
  .tile img { display:block; }
  .full { grid-column:1/-1; }
  .mono-dark { color:#f3f4f6; } .mono-light { color:#1a1c20; }
</style>
</head>
<body>
  <h1>setuq brand kit</h1>
  <p class="sub">Closed-loop cycle + sovereign shield · purple→cyan</p>
  <div class="grid">
    <div class="tile full purple"><img src="setuq-banner.svg" width="100%"><span>banner (readme / github profile)</span></div>
    <div class="tile dark"><img src="setuq-mark.svg" width="96" height="96"><span>mark · dark</span></div>
    <div class="tile light"><img src="setuq-mark.svg" width="96" height="96"><span>mark · light</span></div>
    <div class="tile dark"><img src="setuq-favicon.svg" width="48" height="48"><img src="setuq-favicon.svg" width="16" height="16"><span>favicon 48 / 16px</span></div>
    <div class="tile dark mono-dark"><img src="setuq-mark-mono.svg" width="96" height="96" style="filter:none"><span>mono (currentColor)</span></div>
    <div class="tile dark"><img src="setuq-wordmark.svg" height="56"><span>wordmark · dark</span></div>
    <div class="tile light"><img src="setuq-wordmark.svg" height="56"><span>wordmark · light</span></div>
  </div>
</body>
</html>
