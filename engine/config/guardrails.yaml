# ─────────────────────────────────────────────────────────────────────────────
# Guardrail rules for generated SPL — the SOLE source of truth.
#
# There are NO code defaults. Both keys below are REQUIRED and loaded at startup;
# a missing/malformed file is a hard failure (the engine refuses to start).
# Applied at startup; restart the engine after editing.
#
# Path is configurable via GUARDRAILS_CONFIG_PATH (default: config/guardrails.yaml).
#
# Note: the "unknown index" check is driven by the live schema, not this file.
# ─────────────────────────────────────────────────────────────────────────────

# Max allowed time range (in days) for `earliest=`. Required, positive integer.
max_time_range_days: 30

# Resource-heavy / dangerous SPL patterns to block. Required (may be an empty
# list to disable resource-heavy blocking entirely). Each entry: a
# case-insensitive regex (`pattern`) and the user-facing `reason`. Invalid
# regexes are skipped (logged), never fatal.
resource_heavy_patterns:
  - pattern: '\|\s*join\b(?![^|]*\b(?:max|overwrite)\s*=)'
    reason: "Unbounded join — add max= or use stats instead"
  - pattern: '\|\s*collect\b(?!.*index=)'
    reason: "collect without target index"
  - pattern: '\|\s*delete\b'
    reason: "delete command not allowed"
  - pattern: '\|\s*outputlookup\b'
    reason: "outputlookup not allowed via agent"
